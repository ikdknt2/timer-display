<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>G5 Display Base</title>

<style>
body {
  background: #ddd;
  margin: 0;
}

/* 全体をまとめる */
.wrapper {
  width: 760px;
  height: 400px;
  margin: 100px auto;
  position: relative;
}

/* 青い楕円（外側） */
.outer {
  width: 760px;
  height: 300px;

  background: linear-gradient(to bottom, #2f8cff, #1a5fbf);
  border-radius: 50%;

  display: flex;
  align-items: center;
  justify-content: center;

  position: relative;
}

/* 黒い楕円（内側） */
.inner {
  width: 700px;
  height: 240px;

  background: linear-gradient(to bottom, #555, #222);
  border-radius: 50%;
}

.stand {
  width: 70px;
  height: 500px;
  background: linear-gradient(#222, #000);
  border-radius: 12px;
  position: absolute;
  left: 47%;
  z-index: -1;
  top: 50px;
}

  .time {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);

  font-family: 'DS-Digital', monospace;
  font-size: 120px;

  color: #eaeaea; /* 真っ白じゃないのがポイント */

  letter-spacing: 10px;
}

@font-face {
  font-family: 'DS-Digital';
  src: url('DS-DIGI.TTF') format('truetype');
}
③ タイム表示を作る
  
</style>

</head>
<body>
<div class="wrapper">
    <div class="stand"></div>
    <div class="outer">
        <div class="inner">
            <div class="time" id="time">12.34</div>
        </div>
    </div>
</div>

</body>
</html>
